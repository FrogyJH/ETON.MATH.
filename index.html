<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이튼영어수학학원 오답 체크 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen" onload="loadStudentsFromGoogle()">

    <div class="bg-blue-600 shadow-md sticky top-0 z-50 text-white">
        <div class="max-w-md mx-auto px-4 flex justify-around">
            <button id="btn-student" onclick="switchMode('student')" class="py-4 px-2 border-b-4 border-white font-bold w-1/2 text-center">
                📱 학생용 입력
            </button>
            <button id="btn-admin" onclick="checkAdminPassword()" class="py-4 px-2 text-blue-200 font-bold w-1/2 text-center opacity-80 hover:opacity-100">
                🔒 원장님 관리
            </button>
        </div>
    </div>

    <div class="max-w-md mx-auto p-4 pb-24">
        <div id="status-bar" class="hidden bg-blue-50 text-blue-700 text-xs text-center py-2 rounded-xl border border-blue-100 mb-3 font-medium">
            ⏳ 구글 시트에서 명단 데이터를 동기화 중입니다...
        </div>

        <div id="view-student" class="block space-y-4">
            
            <div class="text-center py-2">
                <h1 class="text-xl font-black text-slate-800 tracking-tight">이튼영어수학학원</h1>
                <p class="text-xs text-slate-400 font-bold tracking-widest mt-0.5">MAY ETON FLOURISH</p>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm space-y-3">
                <h2 class="text-base font-bold text-gray-800">👋 학년과 이름을 골라라</h2>
                <div>
                    <label class="text-xs text-gray-400 block mb-1">학년 선택</label>
                    <select id="student-grade-selector" onchange="filterStudentNames()" class="w-full p-3 bg-gray-50 border rounded-xl font-medium text-gray-700 focus:outline-none">
                        <option value="">-- 학년 선택 --</option>
                        <option value="중1">중1</option><option value="중2">중2</option><option value="중3">중3</option>
                        <option value="고1">고1</option><option value="고2">고2</option><option value="고3">고3</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-gray-400 block mb-1">이름 선택</label>
                    <select id="student-name-selector" onchange="askStudentPassword()" class="w-full p-3 bg-gray-50 border rounded-xl font-medium text-gray-700 focus:outline-none" disabled>
                        <option value="">-- 학년을 먼저 선택하세요 --</option>
                    </select>
                </div>
            </div>

            <div id="student-auth-section" class="hidden bg-gray-800 text-white p-5 rounded-2xl space-y-3 shadow-md">
                <h3 class="font-bold text-sm">🔒 개인 보안 인증</h3>
                <p class="text-xs text-gray-400">본인의 비밀번호 4자리를 입력하세요.</p>
                <div class="flex gap-2">
                    <input type="password" id="student-password-input" maxlength="4" placeholder="비밀번호" class="w-full p-3 border rounded-xl font-bold text-center text-gray-900 text-lg focus:outline-none">
                    <button onclick="verifyStudentPassword()" class="bg-blue-600 text-white px-6 rounded-xl font-bold text-sm hover:bg-blue-700 whitespace-nowrap">확인</button>
                </div>
            </div>

            <div id="student-homework-list-section" class="hidden bg-white p-5 rounded-2xl shadow-sm space-y-3">
                <h3 class="text-xs font-bold text-gray-400 uppercase" id="welcome-student-msg">📋 오늘 제출할 숙제 선택</h3>
                <div id="student-homework-buttons" class="space-y-2"></div>
            </div>

            <div id="homework-input-section" class="hidden bg-white p-5 rounded-2xl shadow-sm space-y-4">
                <div class="border-b pb-2">
                    <h3 class="text-lg font-bold text-gray-800" id="selected-hw-title">숙제명</h3>
                    <p class="text-xs text-gray-400 mt-1">📌 채점 확인 후 <span class="text-red-500 font-bold">틀린 번호만 터치해서 X로</span> 바꾸세요!</p>
                </div>
                <div class="grid grid-cols-5 gap-3 py-2" id="number-grid"></div>
                <button onclick="submitToGoogleSheet()" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-md text-base transition-colors">
                    🚀 오답 기록 구글 시트로 제출하기
                </button>
            </div>
        </div>

        <div id="view-admin" class="hidden space-y-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm space-y-4">
                <h3 class="text-base font-bold text-gray-800">📚 1. 숙제 배부 및 마감 관리</h3>
                <div class="space-y-3">
                    <div>
                        <label class="text-xs text-gray-400 block mb-1">대상 학년 선택</label>
                        <select id="hw-target-grade" class="w-full p-2.5 bg-gray-50 border rounded-xl font-medium text-gray-700">
                            <option value="중1">중학교 1학년</option><option value="중2">중학교 2학년</option><option value="중3">중학교 3학년</option>
                            <option value="고1" selected>고등학교 1학년</option><option value="고2">고등학교 2학년</option><option value="고3">고등학교 3학년</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 block mb-1">숙제 명칭</label>
                        <input type="text" id="hw-title" placeholder="예: 다항식 고난도 프린트" class="w-full p-2.5 bg-gray-50 border rounded-xl">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="hw-start" value="1" class="w-full p-2.5 bg-gray-50 border rounded-xl text-center font-bold">
                        <input type="number" id="hw-end" value="20" class="w-full p-2.5 bg-gray-50 border rounded-xl text-center font-bold">
                    </div>
                </div>
                <button onclick="addNewHomework()" class="w-full bg-gray-800 hover:bg-gray-900 text-white py-3 rounded-xl text-sm font-bold">이 숙제 추가 배부</button>
                
                <div class="space-y-1 pt-2">
                    <label class="text-xs text-gray-400 block font-bold">💡 진행 중인 숙제:</label>
                    <ul id="admin-hw-list" class="text-xs text-gray-600 space-y-1 bg-gray-50 p-3 rounded-xl border divide-y"></ul>
                </div>
                <div class="space-y-1 pt-2">
                    <label class="text-xs text-gray-400 block font-bold">📁 마감된 숙제 목록:</label>
                    <ul id="admin-closed-hw-list" class="text-xs text-gray-400 space-y-1 bg-gray-100 p-3 rounded-xl divide-y"></ul>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm space-y-2">
                <h3 class="text-base font-bold text-gray-800">👥 2. 동기화된 학생 명단 및 암호 확인</h3>
                <button onclick="loadStudentsFromGoogle()" class="w-full bg-gray-600 hover:bg-gray-700 text-white py-2 rounded-xl text-xs font-bold">🔄 명단 및 암호 강제 동기화</button>
                <div class="max-h-40 overflow-y-auto border rounded-xl p-2 space-y-1 text-xs bg-gray-50" id="admin-student-list"></div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ 본인의 구글 웹앱 URL을 정확하게 붙여넣으세요!
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwwPrGwKdGGAxIzYEbCYEflwbQwuViY1AxbVO3cbsOD4GfFPCjMrDieH00b-WBaXLM/exec";
        const ADMIN_PASSWORD = "0948";

        let students = [];
        let homeworks = JSON.parse(localStorage.getItem('academy_homeworks_v8')) || [];

        let activeStudentId = null;
        let activeHwId = null;
        let localWrongIssues = [];
        let isStudentAuthenticated = false;

        function loadStudentsFromGoogle() {
            if (!WEB_APP_URL || WEB_APP_URL.includes("여기에_방금_복사한")) return;
            const statusBar = document.getElementById('status-bar');
            statusBar.classList.remove('hidden');

            fetch(WEB_APP_URL)
            .then(res => res.json())
            .then(data => {
                if (data && data.result === "success") {
                    students = data.students.map((s, index) => ({ id: index + 1, grade: s.grade, name: s.name, password: s.password }));
                    console.log("명단 동기화 완료");
                }
            })
            .catch(err => console.log("동기화 통신 중"))
            .finally(() => {
                statusBar.classList.add('hidden');
                filterStudentNames();
                renderAdminSections();
            });
        }

        function checkAdminPassword() {
            const input = prompt("👨‍🏫 원장님 관리자 비밀번호를 입력하세요:");
            if (input === ADMIN_PASSWORD) switchMode('admin');
            else if (input !== null) alert("❌ 비밀번호가 틀렸습니다!");
        }

        function switchMode(mode) {
            document.getElementById('view-student').style.display = (mode === 'student') ? 'block' : 'none';
            document.getElementById('view-admin').style.display = (mode === 'admin') ? 'block' : 'none';
            
            const btnStudent = document.getElementById('btn-student');
            const btnAdmin = document.getElementById('btn-admin');

            if (mode === 'student') {
                btnStudent.className = "py-4 px-2 border-b-4 border-white font-bold w-1/2 text-center";
                btnAdmin.className = "py-4 px-2 text-blue-200 font-bold w-1/2 text-center opacity-80";
                resetStudentView();
            } else {
                btnAdmin.className = "py-4 px-2 border-b-4 border-white font-bold w-1/2 text-center";
                btnStudent.className = "py-4 px-2 text-blue-200 font-bold w-1/2 text-center opacity-80";
                renderAdminSections();
            }
        }

        function filterStudentNames() {
            const grade = document.getElementById('student-grade-selector').value;
            const nameSelector = document.getElementById('student-name-selector');
            nameSelector.innerHTML = '<option value="">-- 이름 선택 --</option>';
            hideStudentSubSections();

            if (!grade) { nameSelector.disabled = true; return; }
            const filtered = students.filter(s => s.grade === grade);
            
            if(filtered.length === 0) {
                nameSelector.innerHTML = '<option value="">(연동 대기 중이거나 학생 없음)</option>';
                nameSelector.disabled = true;
                return;
            }
            filtered.forEach(s => {
                nameSelector.innerHTML += `<option value="${s.id}">${s.name}</option>`;
            });
            nameSelector.disabled = false;
        }

        function askStudentPassword() {
            activeStudentId = document.getElementById('student-name-selector').value;
            hideStudentSubSections();
            isStudentAuthenticated = false;
            if (!activeStudentId) return;
            document.getElementById('student-auth-section').classList.remove('hidden');
        }

        function verifyStudentPassword() {
            const inputPw = document.getElementById('student-password-input').value.trim();
            const studentObj = students.find(s => s.id == activeStudentId);
            if (!studentObj) return;

            if (inputPw === studentObj.password) {
                isStudentAuthenticated = true;
                document.getElementById('student-auth-section').classList.add('hidden');
                loadStudentHomeworkList();
            } else {
                alert("❌ 비밀번호가 틀렸습니다.");
            }
        }

        function loadStudentHomeworkList() {
            if(!isStudentAuthenticated) return;
            const studentObj = students.find(s => s.id == activeStudentId);
            const listSection = document.getElementById('student-homework-list-section');
            const btnContainer = document.getElementById('student-homework-buttons');
            
            btnContainer.innerHTML = '';
            document.getElementById('welcome-student-msg').innerHTML = `📋 <span class="text-blue-600 font-bold">${studentObj.name}</span> 학생, 오늘 제출할 숙제 선택`;

            const myGradeHomeworks = homeworks.filter(hw => hw.active !== false && hw.targetGrade === studentObj.grade);
            if(myGradeHomeworks.length === 0) {
                btnContainer.innerHTML = '<p class="text-xs text-gray-400 text-center py-4">제출할 숙제가 없습니다. 👍</p>';
                listSection.classList.remove('hidden');
                return;
            }
            listSection.classList.remove('hidden');
            myGradeHomeworks.forEach(hw => {
                btnContainer.innerHTML += `<button onclick="startHomeworkInput(${hw.id})" class="w-full text-left p-3 bg-gray-50 border rounded-xl text-sm flex justify-between items-center font-semibold text-gray-700 hover:bg-blue-50">
                    <span>${hw.title} <span class="text-xs text-gray-400 font-normal">(${hw.start}~${hw.end}번)</span></span>
                    <span class="text-blue-600 text-xs font-bold">선택 ➔</span>
                </button>`;
            });
        }

        function startHomeworkInput(hwId) {
            activeHwId = hwId;
            const hw = homeworks.find(h => h.id === hwId);
            document.getElementById('homework-input-section').classList.remove('hidden');
            document.getElementById('selected-hw-title').textContent = hw.title;
            
            const grid = document.getElementById('number-grid');
            grid.innerHTML = ''; localWrongIssues = [];

            for (let i = hw.start; i <= hw.end; i++) {
                grid.innerHTML += `<button id="num-btn-${i}" onclick="toggleNumber(${i})" class="p-3 rounded-xl border font-bold text-center bg-gray-50 text-gray-700 text-sm">
                    ${i}<br><span class="text-xs text-blue-500 font-bold">O</span>
                </button>`;
            }
        }

        function toggleNumber(num) {
            const btn = document.getElementById(`num-btn-${num}`);
            const index = localWrongIssues.indexOf(num);
            if (index > -1) {
                localWrongIssues.splice(index, 1);
                btn.className = "p-3 rounded-xl border font-bold text-center bg-gray-50 text-gray-700 text-sm";
                btn.innerHTML = `${num}<br><span class="text-xs text-blue-500 font-bold">O</span>`;
            } else {
                localWrongIssues.push(num); localWrongIssues.sort((a, b) => a - b);
                btn.className = "p-3 rounded-xl border-2 font-bold text-center bg-red-50 border-red-500 text-red-600 text-sm";
                btn.innerHTML = `${num}<br><span class="text-xs font-bold">X</span>`;
            }
        }

        function submitToGoogleSheet() {
            const studentObj = students.find(s => s.id == activeStudentId);
            const hwObj = homeworks.find(h => h.id == activeHwId);
            const submitBtn = document.getElementById('submit-btn');

            submitBtn.disabled = true;
            submitBtn.textContent = "⏳ 구글 시트로 안전하게 전송 중...";

            const payload = {
                grade: studentObj.grade,
                name: studentObj.name,
                hwTitle: hwObj.title,
                wrongNumbers: localWrongIssues.length > 0 ? localWrongIssues.join(", ") : "다 맞음 🎉"
            };

            fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) })
            .catch(err => console.log("POST 완료"))
            .finally(() => {
                alert(`🎉 ${studentObj.name} 학생의 오답 전송이 완료되었습니다!`);
                submitBtn.disabled = false;
                submitBtn.textContent = "🚀 오답 기록 구글 시트로 제출하기";
                resetStudentView();
            });
        }

        function hideStudentSubSections() {
            document.getElementById('student-auth-section').classList.add('hidden');
            document.getElementById('student-homework-list-section').classList.add('hidden');
            document.getElementById('homework-input-section').classList.add('hidden');
        }

        function renderAdminSections() {
            const hwList = document.getElementById('admin-hw-list');
            const closedHwList = document.getElementById('admin-closed-hw-list');
            if(hwList) hwList.innerHTML = ''; 
            if(closedHwList) closedHwList.innerHTML = '';

            homeworks.forEach((h) => {
                const targetLi = (h.active !== false) ? hwList : closedHwList;
                const btnHtml = (h.active !== false) ? 
                    `<button onclick="toggleHomeworkStatus(${h.id}, false)" class="bg-amber-500 text-white px-2 py-0.5 rounded text-xs font-bold">마감</button>` :
                    `<div class="space-x-2 font-bold text-xs"><button onclick="toggleHomeworkStatus(${h.id}, true)" class="text-blue-500">복원</button><button onclick="permanentlyDeleteHomework(${h.id})" class="text-red-400">삭제</button></div>`;
                
                if(targetLi) {
                    targetLi.innerHTML += `<li class="py-2 flex justify-between items-center">
                        <span>[${h.targetGrade || '공통'}] <strong>${h.title}</strong> (${h.start}~${h.end}번)</span>
                        ${btnHtml}
                    </li>`;
                }
            });

            const stuList = document.getElementById('admin-student-list');
            if(stuList) {
                stuList.innerHTML = '';
                if(students.length === 0) {
                    stuList.innerHTML = '<p class="text-gray-400 text-center py-2">구글 시트 연동을 대기 중입니다. (새로고침을 해보세요)</p>';
                } else {
                    students.forEach(s => {
                        stuList.innerHTML += `<div class="p-2 border-b flex justify-between bg-white rounded mb-1 shadow-sm">
                            <span>[${s.grade}] <strong>${s.name}</strong></span>
                            <span class="text-gray-400 font-mono">암호: ${s.password}</span>
                        </div>`;
                    });
                }
            }
        }

        function addNewHomework() {
            const grade = document.getElementById('hw-target-grade').value;
            const title = document.getElementById('hw-title').value.trim();
            const start = parseInt(document.getElementById('hw-start').value);
            const end = parseInt(document.getElementById('hw-end').value);
            if (!title || start > end) return alert("입력 값을 확인해 주세요.");
            
            homeworks.push({ id: Date.now(), targetGrade: grade, title, start, end, active: true });
            localStorage.setItem('academy_homeworks_v8', JSON.stringify(homeworks));
            document.getElementById('hw-title').value = '';
            renderAdminSections();
            alert(`🚀 [${grade}] 신규 숙제가 추가되었습니다.`);
        }

        function toggleHomeworkStatus(id, status) {
            const hw = homeworks.find(h => h.id === id);
            if(hw) {
                hw.active = status;
                localStorage.setItem('academy_homeworks_v8', JSON.stringify(homeworks));
                renderAdminSections();
            }
        }

        function permanentlyDeleteHomework(id) {
            if(confirm("이 숙제를 아예 삭제하시겠습니까?")) {
                homeworks = homeworks.filter(h => h.id !== id);
                localStorage.setItem('academy_homeworks_v8', JSON.stringify(homeworks));
                renderAdminSections();
            }
        }

        function resetStudentView() {
            document.getElementById('student-grade-selector').value = "";
            filterStudentNames(); isStudentAuthenticated = false;
        }
    </script>
</body>
</html>
